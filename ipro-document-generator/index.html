<!DOCTYPE html>
<html lang="en" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- I-Pro Solutions Document Generator v3.0 | Built: 2026-06-11 -->
  <meta name="description" content="I-Pro Solutions Business Document Generator v3.0 — Quotations, Proforma Invoices and Tax Invoices for IP, Trademark, Copyright, Patent and Legal services.">
  <meta name="keywords" content="I-Pro Solutions, document generator, quotation, invoice, trademark, copyright, patent, IP services">
  <meta name="robots" content="noindex, nofollow">
  <title>I-Pro Solutions — Document Generator v3.0</title>

  <!-- Auto Hard Refresh on Deployment -->
  <script>
    const APP_VERSION = 'v3.8.1';
    const storedVersion = localStorage.getItem('ipro_app_version');
    if (storedVersion !== APP_VERSION) {
      localStorage.setItem('ipro_app_version', APP_VERSION);
      window.location.reload(true); // Force hard refresh
    }
  </script>

  <!-- Favicon inline SVG -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%230F2D52'/><text x='50%' y='60%' text-anchor='middle' font-family='Inter,sans-serif' font-weight='900' font-size='18' fill='white'>iP</text></svg>">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/css/styles.css">

  <!-- html2pdf.js via CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════
     LOGIN OVERLAY
═══════════════════════════════════════════════════════ -->
<div id="login-overlay" style="position:fixed;top:0;left:0;width:100vw;height:100vh;background:#0F2D52;z-index:99999;display:flex;align-items:center;justify-content:center;">
  <div style="background:#fff;padding:40px;border-radius:16px;box-shadow:0 10px 25px rgba(0,0,0,0.5);width:100%;max-width:400px;text-align:center;">
    <div style="display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:24px;">
      <div style="background:#0F2D52;border-radius:10px;padding:8px 12px;font-size:24px;font-weight:900;color:#fff;font-family:'Inter',sans-serif;">
        i<span style="color:#F97316">P</span>
      </div>
      <div style="text-align:left;">
        <div style="font-weight:bold;font-size:18px;color:#0F2D52;">I-Pro Solutions</div>
        <div style="font-size:12px;color:#6B7280;">Secure Access</div>
      </div>
    </div>
    
    <div id="login-error" style="color:#EF4444;font-size:14px;margin-bottom:16px;display:none;">Invalid credentials.</div>
    
    <form id="login-form" onsubmit="App.login(event)" style="display:flex;flex-direction:column;gap:16px;text-align:left;">
      <div>
        <label style="font-size:14px;font-weight:600;color:#374151;margin-bottom:6px;display:block;">Username</label>
        <input type="text" id="login-username" required style="width:100%;padding:10px 14px;border:1px solid #D1D5DB;border-radius:8px;font-size:15px;outline:none;" placeholder="Enter username">
      </div>
      <div>
        <label style="font-size:14px;font-weight:600;color:#374151;margin-bottom:6px;display:block;">Password</label>
        <input type="password" id="login-password" required style="width:100%;padding:10px 14px;border:1px solid #D1D5DB;border-radius:8px;font-size:15px;outline:none;" placeholder="Enter password">
      </div>
      <button type="submit" style="background:#2563EB;color:#fff;padding:12px;border:none;border-radius:8px;font-weight:600;font-size:15px;cursor:pointer;margin-top:8px;">Sign In</button>
    </form>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════
     APP LAYOUT
═══════════════════════════════════════════════════════ -->
<div class="app-layout" id="main-app" style="display:none;">

  <!-- ─── SIDEBAR ───────────────────────────────────────── -->
  <aside class="sidebar" id="sidebar">
    <!-- Logo -->
    <div class="sidebar-logo header-logo-area">
      <div class="flex items-center gap-3">
        <img id="nav-logo" src="" alt="I-Pro Solutions" class="sidebar-logo-img hidden" style="height:48px; width:auto; object-fit:contain; filter:brightness(10);">
        <div id="nav-logo-text" class="flex items-center gap-2">
          <div style="background:rgba(255,255,255,0.15); border-radius:10px; padding:6px 10px; font-size:20px; font-weight:900; color:#fff; letter-spacing:-0.5px; font-family:'Inter',sans-serif;">
            i<span style="color:#F97316">P</span>
          </div>
        </div>
        <div>
          <div class="sidebar-logo-text">I-Pro Solutions</div>
          <div class="sidebar-logo-sub">Document Generator</div>
        </div>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="sidebar-nav">
      <div class="nav-section-label">Main</div>

      <button class="nav-item" data-nav="dashboard" onclick="App.navigate('dashboard')" id="nav-dashboard">
        <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        Dashboard
      </button>

      <div class="nav-section-label">Documents</div>

      <button class="nav-item" data-nav="documents" onclick="App.navigate('documents')" id="nav-documents">
        <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
        All Documents
      </button>

      <button class="nav-item" onclick="Documents.openBuilder(null,null,'quotation')">
        <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
        </svg>
        New Quotation
      </button>

      <button class="nav-item" onclick="Documents.openBuilder(null,null,'proforma')">
        <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
        </svg>
        New Proforma
      </button>

      <button class="nav-item" onclick="Documents.openBuilder(null,null,'invoice')">
        <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
        </svg>
        New Tax Invoice
      </button>

      <div class="nav-section-label">Masters</div>

      <button class="nav-item" data-nav="clients" onclick="App.navigate('clients')" id="nav-clients">
        <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        Clients
      </button>

      <button class="nav-item" data-nav="services" onclick="App.navigate('services')" id="nav-services">
        <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
        </svg>
        Services
      </button>

    </nav>

    <!-- Sidebar Footer -->
    <div class="sidebar-footer">
      <button class="nav-item" data-nav="settings" onclick="App.navigate('settings')" id="nav-settings">
        <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        Settings
      </button>
      <div style="padding: 12px 10px 4px; font-size: 10px; color: rgba(255,255,255,0.25); text-align: center;">
        I-Pro Solutions © 2026 · v1.0
      </div>
    </div>
  </aside>

  <!-- ─── MAIN CONTENT ──────────────────────────────────── -->
  <div class="main-content">

    <!-- TOP HEADER -->
    <header class="top-header">
      <!-- Mobile Menu Button -->
      <button id="mobile-menu-btn" class="hidden items-center justify-center w-10 h-10 rounded-xl hover:bg-surface-2 transition-colors text-muted" style="display:none;" aria-label="Open menu">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>

      <!-- Global Search -->
      <div class="search-box flex-1" style="max-width: 420px;">
        <svg xmlns="http://www.w3.org/2000/svg" class="search-icon w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0"/>
        </svg>
        <input type="text" id="global-search" placeholder="Search documents, clients…" class="search-input" autocomplete="off">
      </div>

      <!-- Header Actions -->
      <div class="flex items-center gap-3">
        <!-- Dark Mode Toggle -->
        <button id="dark-mode-toggle" class="flex items-center justify-center w-10 h-10 rounded-xl border border-border hover:bg-surface-2 transition-colors" aria-label="Toggle dark mode" title="Toggle dark mode">
          <svg id="dark-mode-icon" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-muted" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
          </svg>
        </button>

        <!-- Company Badge -->
        <div class="flex items-center gap-3 pl-3" style="border-left: 1px solid var(--border);">
          <div style="width:36px; height:36px; background:var(--primary); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:800; color:#fff; letter-spacing:-0.5px;">
            iP
          </div>
          <div class="hidden sm:block">
            <div style="font-size:13px; font-weight:700; color:var(--text);">I-Pro Solutions</div>
            <div style="font-size:11px; color:var(--text-muted);">Document Generator</div>
          </div>
        </div>
      </div>
    </header>

    <!-- MOBILE NAV PANEL -->
    <div id="mobile-nav-panel" class="hidden" style="position:fixed; top:64px; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); z-index:8999; backdrop-filter:blur(4px);">
      <div style="background:var(--primary); width:260px; height:100%; overflow-y:auto; padding:16px 12px;">
        <button class="nav-item" data-nav="dashboard">📊 Dashboard</button>
        <button class="nav-item" data-nav="documents">📄 Documents</button>
        <button class="nav-item" data-nav="clients">👥 Clients</button>
        <button class="nav-item" data-nav="services">📋 Services</button>
        <button class="nav-item" data-nav="settings">⚙ Settings</button>
      </div>
    </div>

    <!-- ─── PAGE VIEWS ────────────────────────────────── -->
    <main class="page-content">

      <!-- DASHBOARD -->
      <div id="dashboard-view" class="animate-fade-in">
        <!-- Rendered by Dashboard.render() -->
        <div class="empty-state">
          <div class="loading-skeleton" style="width:100%; height:120px; margin-bottom:16px;"></div>
          <div class="loading-skeleton" style="width:100%; height:200px;"></div>
        </div>
      </div>

      <!-- DOCUMENTS LIST -->
      <div id="documents-view" class="hidden animate-fade-in">
        <!-- Rendered by Documents.render() -->
      </div>

      <!-- DOCUMENT BUILDER -->
      <div id="builder-view" class="hidden animate-fade-in">
        <!-- Rendered by Documents.openBuilder() -->
      </div>

      <!-- DOCUMENT PREVIEW -->
      <div id="preview-view" class="hidden animate-fade-in">
        <!-- Rendered by Documents.preview() -->
      </div>

      <!-- CLIENTS -->
      <div id="clients-view" class="hidden animate-fade-in">
        <!-- Rendered by Clients.render() -->
      </div>

      <!-- SERVICES -->
      <div id="services-view" class="hidden animate-fade-in">
        <!-- Rendered by Services.render() -->
      </div>

      <!-- SETTINGS -->
      <div id="settings-view" class="hidden animate-fade-in">
        <!-- Rendered by Settings.render() -->
      </div>

    </main>
  </div><!-- /main-content -->
</div><!-- /app-layout -->


<!-- ═══════════════════════════════════════════════════════
     SLIDE PANEL (for forms)
═══════════════════════════════════════════════════════ -->
<div id="slide-panel-overlay" class="hidden" style="position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:7999; backdrop-filter:blur(2px);" onclick="App.closeSlidePanel()"></div>

<div id="slide-panel" class="translate-x-full" role="dialog" aria-modal="true">
  <div class="slide-panel-header">
    <h2 id="slide-panel-title" class="slide-panel-title">Form</h2>
    <button onclick="App.closeSlidePanel()" class="icon-btn" aria-label="Close panel">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>
  <div id="slide-panel-body">
    <!-- Dynamic form content -->
  </div>
</div>


<!-- ═══════════════════════════════════════════════════════
     GLOBAL MODAL (confirmations)
═══════════════════════════════════════════════════════ -->
<div id="global-modal" class="hidden" role="dialog" aria-modal="true">
  <div class="modal-box">
    <div class="flex items-start justify-between mb-4">
      <h3 id="modal-title" style="font-size:18px; font-weight:700; color:var(--primary);">Confirm</h3>
      <button onclick="document.getElementById('global-modal').classList.add('hidden')" class="icon-btn">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <div id="modal-body" style="font-size:14px; color:var(--text-muted); margin-bottom:24px; line-height:1.6;"></div>
    <div class="flex justify-end gap-3">
      <button id="modal-cancel" class="btn btn-secondary">Cancel</button>
      <button id="modal-confirm" class="btn btn-primary">Confirm</button>
    </div>
  </div>
</div>


<!-- ═══════════════════════════════════════════════════════
     TOAST CONTAINER
═══════════════════════════════════════════════════════ -->
<div id="toast-container" aria-live="polite" aria-atomic="false"></div>


<!-- ═══════════════════════════════════════════════════════
     PRINT STYLES
═══════════════════════════════════════════════════════ -->
<style>
  @media print {
    body * { visibility: hidden; }
    #document-preview-area, #document-preview-area * { visibility: visible; }
    #document-preview-area {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      margin: 0 !important;
      padding: 0 !important;
      box-shadow: none !important; 
      border-radius: 0 !important;
      background: white !important;
    }
    @page { margin: 0; size: A4 portrait; }
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  }

  /* Dark mode overrides for body */
  .dark body, body.dark { background: #0B1120; color: #F9FAFB; }

  /* Inline utility for display flex (since we don't have Tailwind) */
  @media (min-width: 640px) {
    .sm\:block { display: block !important; }
    .hidden.sm\:block { display: block !important; }
  }
</style>

</body>
